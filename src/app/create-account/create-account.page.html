<ion-content [fullscreen]="true">
  <div class="signup-wrapper">
    <div class="center-content">
      <div class="header-section">
        <h1>Create Account</h1>
        <p>Sign up and verify via Email Link</p>
      </div> 

      <div class="input-form">
        <div class="input-group">
          <label>Email Address</label>
          <div class="input-item">
            <ion-icon name="mail-outline"></ion-icon>
            <input type="email" placeholder="example@mail.com" [(ngModel)]="signupData.email">
          </div>
        </div>

        <div class="input-group">
          <label>Password</label>
          <div class="input-item">
            <ion-icon name="lock-closed-outline"></ion-icon>
            <input type="password" placeholder="••••••••" [(ngModel)]="signupData.password">
          </div>
        </div>
      </div>

      <div class="button-section">
        <button class="signup-btn" (click)="onCreateAccount()" [disabled]="isLoading">
          {{ isLoading ? 'Sending Link...' : 'Create Account & Verify' }}
        </button>
      </div>
    </div>
  </div>
</ion-content>
